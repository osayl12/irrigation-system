services:
  mysql:
    image: mysql:8.0
    container_name: irrigation-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: irrigation_system
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./BackEnd/sql/irrigation_system.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: irrigation-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: irrigation-backend
    environment:
      PORT: 3000
      HOST: mysql
      USER_DB: root
      PASSWORD_DB: root
      DATABASE: irrigation_system
      MQTT_URL: mqtt://mosquitto:1883
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started

  web:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: irrigation-web
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_log:
